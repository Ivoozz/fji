<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "FixJeICT - Uw IT Support Partner" }}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="FixJeICT biedt professionele en snelle IT-ondersteuning voor particulieren en bedrijven. Van ticketsystemen tot cloud-oplossingen.">
    <meta name="keywords" content="IT support, ticketsysteem, FixJeICT, computerhulp, cloud beheer, automatisering">
    <meta name="author" content="FixJeICT Team">
    <meta property="og:title" content="FixJeICT - Professionele IT Support">
    <meta property="og:description" content="Krijg direct hulp van experts. Log in of maak een ticket aan voor snelle ondersteuning.">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">

    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-blue: #0d6efd;
            --deep-navy: #1a1e2b;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
        }

        /* Liquid Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        /* Navbar Styling */
        .navbar {
            background: rgba(26, 30, 43, 0.8) !important;
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #fff !important;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        /* Typography */
        h1, h2, h3 {
            font-weight: 700;
            color: var(--deep-navy);
        }

        .text-gradient {
            background: linear-gradient(90deg, #0d6efd, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        footer {
            background: var(--deep-navy);
            color: white;
            padding: 3rem 0;
            margin-top: 5rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <i class="bi bi-cpu-fill me-2 fs-3 text-primary"></i>
            <span class="fw-bold tracking-tight">FixJeICT</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/services">Diensten</a></li>
                <li class="nav-item"><a class="nav-link" href="/knowledge-base">Knowledge Base</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
            </ul>
            <div class="d-flex gap-2">
                {% if user %}
                    <a href="/tickets" class="btn btn-outline-light rounded-pill">Mijn Tickets</a>
                    <a href="/logout" class="btn btn-danger rounded-pill">Uitloggen</a>
                {% else %}
                    <a href="/login" class="btn btn-primary rounded-pill px-4">Inloggen</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="py-5">
    {% block content %}{% endblock %}
</main>

<footer>
    <div class="container text-center">
        <div class="mb-4">
            <h4 class="fw-bold">FixJeICT</h4>
            <p class="opacity-50">Eenvoudig, Snel & Betrouwbaar IT Support.</p>
        </div>
        <div class="d-flex justify-content-center gap-4 mb-4 fs-4">
            <a href="#" class="text-white opacity-75"><i class="bi bi-linkedin"></i></a>
            <a href="#" class="text-white opacity-75"><i class="bi bi-twitter-x"></i></a>
            <a href="#" class="text-white opacity-75"><i class="bi bi-github"></i></a>
        </div>
        <hr class="opacity-10">
        <p class="small opacity-50 mb-0">&copy; 2026 FixJeICT. Alle rechten voorbehouden.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
