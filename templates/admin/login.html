<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | FixJeICT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="hero-orb hero-orb-1" style="position: fixed;"></div>
    <div class="hero-orb hero-orb-2" style="position: fixed;"></div>

    <div class="card login-card fade-up">
        <div class="text-center mb-4">
            <div class="service-icon mx-auto mb-3" style="width: 72px; height: 72px; font-size: 2rem;">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h2 class="fw-bold mb-1">Admin Login</h2>
            <p class="text-muted">FixJeICT Beheerpaneel</p>
        </div>

        {% if error %}
            <div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div>{{ error }}</div>
            </div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="mb-3">
                <label for="username" class="form-label">Gebruikersnaam</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Voer gebruikersnaam in" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Wachtwoord</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Voer wachtwoord in" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Inloggen
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Terug naar website
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.fade-up').forEach(function (el) {
                setTimeout(function () { el.classList.add('visible'); }, 50);
            });
        });
    </script>
</body>
</html>
