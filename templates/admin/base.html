<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %} | FixJeICT Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid var(--glass-border);
        }
        .sidebar .nav-link {
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 0;
            border-left: 3px solid transparent;
            font-weight: 500;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: var(--accent-cyan);
            background-color: rgba(6, 182, 212, 0.07);
            border-left-color: var(--accent-cyan);
        }
        .sidebar .nav-link i {
            width: 24px;
        }
        .stat-card {
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/">
                <i class="bi bi-shield-lock me-2" style="color: var(--accent-cyan);"></i>Fix<span>JeICT</span> Admin
            </a>
            <div class="d-flex align-items-center">
                <span class="me-3" style="color: var(--text-secondary);"><i class="bi bi-person-circle me-1"></i>{{ admin_username }}</span>
                <a href="/" class="btn btn-outline-secondary btn-sm me-2">
                    <i class="bi bi-box-arrow-up-right me-1"></i>Publieke site
                </a>
                <a href="/admin/logout" class="btn btn-sm" style="color: var(--color-danger); border-color: var(--color-danger);">
                    <i class="bi bi-box-arrow-right me-1"></i>Uitloggen
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div class="nav flex-column">
                    <a class="nav-link {% if request.url.path == '/admin/' %}active{% endif %}" href="/admin/">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                    <a class="nav-link {% if '/admin/tickets' in request.url.path %}active{% endif %}" href="/admin/tickets">
                        <i class="bi bi-ticket me-2"></i>Tickets
                    </a>
                    <a class="nav-link {% if '/admin/users' in request.url.path %}active{% endif %}" href="/admin/users">
                        <i class="bi bi-people me-2"></i>Gebruikers
                    </a>
                    <a class="nav-link {% if '/admin/settings' in request.url.path %}active{% endif %}" href="/admin/settings">
                        <i class="bi bi-gear me-2"></i>Instellingen
                    </a>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
