services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fji_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fji_password}
      POSTGRES_DB: ${POSTGRES_DB:-fji_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fji_user -d fji_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fji_user:fji_password@db:5432/fji_db
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
